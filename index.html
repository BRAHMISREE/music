<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HEHE 😎</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #121212;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 28px;
    }

    /* ALBUM CENTER */
    .album {
      margin-top: 30px;
    }

    .album img {
      width: 220px;
      height: 220px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .album p {
      margin-top: 10px;
      color: #ccc;
    }

    /* SONG LIST */
    .songs {
      margin-top: 30px;
    }

    .song {
      width: 250px;
      margin: 10px auto;
      padding: 12px;
      background: #1e1e1e;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .song:hover {
      background: #2a2a2a;
    }

    .song.active {
      background: #2a2a2a;
      color: #1db954;
    }

    /* PLAYER */
    .player {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #000;
      padding: 10px;
    }
  </style>
</head>

<body>

<h1>HEHE 🎤</h1>

<!-- CENTER ALBUM -->
<div class="album">
  <img src="cover.jpg" alt="Album Cover">
  <p>🤡🤡🤡</p>
</div>

<!-- SONGS -->
<div class="songs">

  <div class="song" onclick="playSong(this, 'songs/song1.ogg', 'Voice Leak 😂')">
    Voice Leak 😂
  </div>

  

</div>

<!-- PLAYER -->
<div class="player">
  <p id="nowPlaying">Nothing playing 😴</p>
  <audio id="audioPlayer" controls></audio>
</div>

<script>
function playSong(element, src, name) {
  const player = document.getElementById("audioPlayer");
  player.src = src;
  player.play();

  document.getElementById("nowPlaying").innerText = "Now Playing: " + name;

  // highlight active
  document.querySelectorAll(".song").forEach(s => s.classList.remove("active"));
  element.classList.add("active");
}
</script>

</body>
</html>
